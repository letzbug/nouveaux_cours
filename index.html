<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>UniPop — Nouveaux cours</title>

  <style>
    :root{
      --bg:#f4f8fd;
      --card:#ffffff;
      --text:#16324f;
      --muted:#667b94;
      --line:#dbe7f3;
      --blue1:#1f5fae;
      --blue2:#4c8fe8;
      --accent:#eaf4ff;
      --shadow:0 14px 34px rgba(35,88,155,.10);
      --max:1180px;
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:
        radial-gradient(circle at top right, rgba(120,182,255,.20), transparent 28%),
        linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
      color:var(--text);
    }

    .page{
      max-width:var(--max);
      margin:0 auto;
      padding:28px 18px 40px;
    }

    .hero{
      background:linear-gradient(135deg, rgba(31,95,174,.96), rgba(76,143,232,.88));
      color:#fff;
      border-radius:28px;
      padding:28px 24px;
      box-shadow:0 18px 40px rgba(31,95,174,.18);
      margin-bottom:22px;
    }

    .eyebrow{
      display:inline-flex;
      align-items:center;
      padding:7px 12px;
      border-radius:999px;
      background:rgba(255,255,255,.16);
      border:1px solid rgba(255,255,255,.22);
      font-size:.84rem;
      font-weight:700;
      margin-bottom:12px;
    }

    h1{
      margin:0 0 8px;
      font-size:clamp(1.8rem, 3vw, 2.8rem);
      line-height:1.08;
      font-weight:800;
    }

    .hero p{
      margin:0;
      max-width:760px;
      color:rgba(255,255,255,.92);
      font-size:1rem;
      line-height:1.55;
    }

    .toolbar{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      align-items:center;
      justify-content:space-between;
      background:rgba(255,255,255,.88);
      border:1px solid rgba(31,95,174,.08);
      border-radius:20px;
      padding:14px;
      box-shadow:var(--shadow);
      margin-bottom:18px;
    }

    .search-wrap{
      flex:1 1 320px;
    }

    .search{
      width:100%;
      height:48px;
      border-radius:14px;
      border:1px solid var(--line);
      background:#fff;
      padding:0 16px;
      font-size:0.98rem;
      color:var(--text);
      outline:none;
    }

    .stats{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      height:40px;
      padding:0 14px;
      border-radius:999px;
      background:var(--accent);
      color:var(--blue1);
      font-weight:700;
      font-size:.92rem;
      border:1px solid #d8e9ff;
      white-space:nowrap;
    }

    .list{
      display:grid;
      gap:14px;
    }

    .card{
      display:grid;
      grid-template-columns:130px 120px minmax(0,1.5fr) minmax(0,1fr) minmax(0,.8fr) 130px;
      gap:16px;
      align-items:center;
      background:var(--card);
      border:1px solid #e3edf7;
      border-radius:24px;
      padding:18px;
      box-shadow:var(--shadow);
      transition:transform .16s ease, box-shadow .16s ease, border-color .16s ease;
      text-decoration:none;
      color:inherit;
    }

    .card:hover{
      transform:translateY(-2px);
      box-shadow:0 18px 36px rgba(35,88,155,.14);
      border-color:#cfe2f7;
    }

    .date{
      font-weight:800;
      font-size:1rem;
      color:var(--blue1);
      line-height:1.2;
    }

    .time{
      font-weight:700;
      color:var(--text);
      font-size:.98rem;
      white-space:nowrap;
    }

    .course-title{
      display:flex;
      align-items:center;
      flex-wrap:wrap;
      gap:8px;
      margin-bottom:8px;
    }

    .course-title .title{
      font-size:1.03rem;
      font-weight:800;
      color:var(--text);
      line-height:1.3;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      height:28px;
      padding:0 10px;
      border-radius:999px;
      background:linear-gradient(180deg,#eff7ff,#e2f0ff);
      color:var(--blue1);
      font-size:.78rem;
      font-weight:800;
      border:1px solid #cfe4ff;
      white-space:nowrap;
    }

    .meta-line{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      color:var(--muted);
      font-size:.9rem;
    }

    .code-chip{
      display:inline-flex;
      align-items:center;
      padding:6px 10px;
      border-radius:999px;
      background:#f4f8fc;
      border:1px solid #dde8f3;
      color:#5b7390;
      font-size:.82rem;
      font-weight:700;
    }

    .place,.trainer{
      min-width:0;
      font-size:.95rem;
      color:var(--text);
      line-height:1.35;
    }

    .place{
      font-weight:700;
      color:#33506d;
    }

    .trainer{
      color:#49657f;
    }

    .cta-wrap{
      display:flex;
      justify-content:flex-end;
    }

    .cta{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:112px;
      height:42px;
      padding:0 16px;
      border-radius:999px;
      background:linear-gradient(135deg, var(--blue1), var(--blue2));
      color:#fff;
      font-weight:800;
      font-size:.92rem;
      text-decoration:none;
      box-shadow:0 10px 24px rgba(54,110,187,.24);
    }

    .empty,.debug{
      background:#fff;
      border:1px solid #e3edf7;
      border-radius:22px;
      padding:28px 20px;
      text-align:center;
      color:var(--muted);
      box-shadow:var(--shadow);
    }

    .debug{
      text-align:left;
      margin-bottom:14px;
      display:none;
      white-space:pre-wrap;
      font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
      font-size:13px;
      color:#8a2b2b;
      background:#fff8f8;
      border-color:#f0c9c9;
    }

    .footer-note{
      margin-top:14px;
      color:var(--muted);
      font-size:.88rem;
      text-align:center;
    }

    @media (max-width: 1080px){
      .card{
        grid-template-columns:120px 110px 1fr;
      }
      .place,.trainer,.cta-wrap{
        grid-column:3;
      }
      .cta-wrap{
        justify-content:flex-start;
      }
    }

    @media (max-width: 720px){
      .page{padding:16px 12px 28px}
      .hero{padding:22px 18px;border-radius:22px}
      .toolbar{padding:12px;border-radius:18px}
      .card{
        grid-template-columns:1fr;
        gap:10px;
        padding:16px;
        border-radius:20px;
      }
      .cta-wrap{justify-content:flex-start}
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="hero">
      <div class="eyebrow">Nouveautés UniPop</div>
      <h1>Nouveaux cours des 3 prochains mois</h1>
      <p>
        Découvrez ici automatiquement les cours récemment mis en ligne. Cliquez sur un cours pour accéder directement à sa page et à l’inscription.
      </p>
    </section>

    <div id="debug" class="debug"></div>

    <section class="toolbar">
      <div class="search-wrap">
        <input id="searchInput" class="search" type="text" placeholder="Rechercher un cours, un lieu ou un formateur…" />
      </div>
      <div class="stats">
        <div class="pill" id="countPill">0 cours</div>
        <div class="pill">Période: 90 jours</div>
      </div>
    </section>

    <section id="list" class="list"></section>
    <div class="footer-note">Mise à jour automatique via GitHub workflow.</div>
  </div>

  <script>
    const DATA_URL = "https://letzbug.github.io/franks_magic/data/trainings.json";
    const DAYS_BACK = 90;

    function showDebug(message){
      const box = document.getElementById("debug");
      box.style.display = "block";
      box.textContent = message;
    }

    function parseFRDate(dateStr){
      if(!dateStr || typeof dateStr !== "string") return null;
      const m = dateStr.trim().match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
      if(!m) return null;
      const day = parseInt(m[1], 10);
      const month = parseInt(m[2], 10) - 1;
      const year = parseInt(m[3], 10);
      const d = new Date(year, month, day);
      return isNaN(d.getTime()) ? null : d;
    }

    function escapeHtml(str){
      return String(str ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function getStartDate(item){
      return item?.dateDebut || item?.date || "";
    }

    function getTimeText(item){
      if (Array.isArray(item?.horaires) && item.horaires.length > 0) {
        const first = item.horaires[0];
        const heure = first?.heure || "";
        const duree = first?.duree || "";
        if (heure && duree) return `${heure} · ${duree}`;
        if (heure) return heure;
      }
      if (item?.heureDebut && item?.heureFin) return `${item.heureDebut}–${item.heureFin}`;
      return item?.horairePrevu || "Horaire à confirmer";
    }

    function getTitle(item){
      return item?.intitule || item?.titre || "Cours";
    }

    function getPlace(item){
      return item?.adresseCours?.nom
        || item?.adresseCours?.localite
        || item?.lieu
        || "Lieu à confirmer";
    }

    function getTrainer(item){
      if (Array.isArray(item?.enseignants) && item.enseignants.length > 0) {
        return item.enseignants
          .map(t => [t?.prenom, t?.nom].filter(Boolean).join(" "))
          .filter(Boolean)
          .join(", ");
      }
      return item?.formateur || "Formateur à confirmer";
    }

    function getCode(item){
      return item?.coursCode || item?.code || item?.id || "";
    }

    function getLink(item){
      return item?.onlineRegistrationUrl || item?.url || "#";
    }

    function isRecent(date){
      if(!date) return false;
      const today = new Date();
      const limit = new Date(today.getFullYear(), today.getMonth(), today.getDate());
      limit.setDate(limit.getDate() - DAYS_BACK);
      return date >= limit;
    }

    function sortByDateAsc(items){
      return items.sort((a,b) => {
        const da = parseFRDate(getStartDate(a))?.getTime() ?? 0;
        const db = parseFRDate(getStartDate(b))?.getTime() ?? 0;
        return da - db;
      });
    }

    function render(items){
      const list = document.getElementById("list");
      const countPill = document.getElementById("countPill");

      countPill.textContent = `${items.length} cours`;

      if(!items.length){
        list.innerHTML = `<div class="empty">Aucun nouveau cours trouvé pour les 3 derniers mois.</div>`;
        return;
      }

      list.innerHTML = items.map(item => {
        const dateText = escapeHtml(getStartDate(item) || "Date à confirmer");
        const timeText = escapeHtml(getTimeText(item));
        const title = escapeHtml(getTitle(item));
        const place = escapeHtml(getPlace(item));
        const trainer = escapeHtml(getTrainer(item));
        const code = escapeHtml(getCode(item));
        const link = escapeHtml(getLink(item));

        return `
          <a class="card" href="${link}" target="_blank" rel="noopener">
            <div class="date">${dateText}</div>
            <div class="time">${timeText}</div>
            <div class="course">
              <div class="course-title">
                <span class="title">${title}</span>
                <span class="badge">Nouveau</span>
              </div>
              <div class="meta-line">
                ${code ? `<span class="code-chip">${code}</span>` : ``}
              </div>
            </div>
            <div class="place">${place}</div>
            <div class="trainer">${trainer}</div>
            <div class="cta-wrap">
              <span class="cta">S’inscrire</span>
            </div>
          </a>
        `;
      }).join("");
    }

    async function loadCourses(){
      const list = document.getElementById("list");
      list.innerHTML = `<div class="empty">Chargement des cours…</div>`;

      try{
        const url = `${DATA_URL}?v=${Date.now()}`;
        const res = await fetch(url, { cache: "no-store" });

        if(!res.ok){
          throw new Error(`HTTP ${res.status} sur ${url}`);
        }

        const items = await res.json();

        if(!Array.isArray(items)){
          throw new Error("Le JSON chargé n'est pas un tableau.");
        }

        const filtered = sortByDateAsc(
  items.filter(item => {
    const d = parseFRDate(getStartDate(item));
    const link = getLink(item);

    // NUR UNIPOP
    const isUniPop = item?.organisateur?.code === "UNIPOP";

    return d && isRecent(d) && link && link !== "#" && isUniPop;
  })

        );

        window.__allCourses = filtered;
        render(filtered);
      }catch(err){
        list.innerHTML = `<div class="empty">Impossible de charger les cours pour le moment.</div>`;
        showDebug(`Erreur de chargement JSON:\n${err.message}\n\nURL testée:\n${DATA_URL}`);
        console.error(err);
      }
    }

    function setupSearch(){
      const input = document.getElementById("searchInput");
      input.addEventListener("input", () => {
        const q = input.value.trim().toLowerCase();
        const all = window.__allCourses || [];

        if(!q){
          render(all);
          return;
        }

        const filtered = all.filter(item => {
          const text = [
            getTitle(item),
            getPlace(item),
            getTrainer(item),
            getCode(item),
            getStartDate(item)
          ].join(" ").toLowerCase();

          return text.includes(q);
        });

        render(filtered);
      });
    }

    setupSearch();
    loadCourses();
  </script>
</body>
</html>
